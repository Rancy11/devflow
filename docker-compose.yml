version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: devflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: devflow
    volumes:
      - mongo_data:/data/db
    networks:
      - devflow-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devflow-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/devflow
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - devflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devflow-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - devflow-net

volumes:
  mongo_data:

networks:
  devflow-net:
    driver: bridge
